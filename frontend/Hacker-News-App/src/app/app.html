<router-outlet />

<main class="container">
  <header class="site-header">
    <span class="logo-mark">Zane's</span>
    <h1>Hacker News App - Challenge</h1>
  </header>

  @if (loading()) {
    <p class="status">Loading stories…</p>
  } @else if (error()) {
    <p class="error">{{ error() }}</p>
  } @else {
    <div class="toolbar">
      <input class="search" type="text" placeholder="Search stories…" (input)="onSearch($any($event.target).value)" />
    </div>

    <ol class="story-list">
      @for (story of filteredStories(); track story.id) {
        <li class="story">
          <a [href]="story.url || 'https://news.ycombinator.com/item?id=' + story.id" target="_blank" rel="noopener">
            {{ story.title }}
          </a>
          <span class="meta">{{ (story?.time ?? 0) * 1000 | date:'medium' }}</span>
        </li>
      }
    </ol>

    <div class="pagination">
      <button (click)="prevPage()" [disabled]="page() === 1">← Prev</button>
      <span class="page-label">Page {{ page() }}</span>
      <button (click)="nextPage()">Next →</button>
    </div>
  }
</main>
